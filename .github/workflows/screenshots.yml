name: Screenshots

# Regenerate screenshots when UI files change, then diff against committed
# goldens to catch unintended visual regressions.
#
# Runs on macOS-14 (ARM) for font consistency — see PLAN-p43-aso.md §D-1.
#
# Security note: this workflow uses contents:write to auto-commit updated
# golden baselines back to the PR branch. It is restricted to same-repo PRs
# (see job-level `if:`) so fork PRs never receive a write-scoped token.

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "lib/**"
      - "assets/**"
      - "test/screenshots/**"
      - "pubspec.yaml"
      - "pubspec.lock"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Regenerate & Diff Screenshots
    runs-on: macos-14
    timeout-minutes: 30
    # Restrict to same-repo PRs only: fork PRs would run untrusted code
    # (pub get, build_runner, flutter test) with a contents:write token,
    # which could exfiltrate the token or push malicious commits.
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the branch tip, not the PR merge commit.
          # Without this, Actions creates a detached HEAD at the merge commit;
          # the auto-commit golden step then can't push back to the branch
          # (rejected as non-fast-forward because the branch HEAD differs).
          ref: ${{ github.head_ref }}
          lfs: true

      - uses: ./.github/actions/setup-flutter

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner (ensure .g.dart files are fresh)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Regenerate golden screenshots
        run: flutter test --update-goldens test/screenshots/drivers/ --no-pub

      - name: Verify all 240 PNGs generated
        run: |
          count=$(find test/screenshots/drivers/goldens -name "*.png" | wc -l)
          echo "Generated $count golden PNGs"
          if [ "$count" -lt 240 ]; then
            echo "Error: expected 240 goldens, got $count" >&2
            exit 1
          fi

      - name: Commit updated goldens if they changed
        # Auto-commit regenerated goldens back to the PR branch so developers
        # don't need to run --update-goldens locally when CI rendering differs
        # slightly from their machine (e.g. different font hinting on macos-14).
        # Uses GITHUB_TOKEN with contents:write permission.
        # GITHUB_TOKEN pushes do NOT trigger new workflow runs (GitHub's built-in
        # recursion guard), so there is no infinite-loop risk.
        run: |
          git diff --name-only test/screenshots/drivers/goldens/ > /tmp/changed_goldens.txt
          if [ -s /tmp/changed_goldens.txt ]; then
            echo "Goldens changed on CI - committing updated baselines:"
            cat /tmp/changed_goldens.txt
            COUNT=$(wc -l < /tmp/changed_goldens.txt | tr -d ' ')
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add test/screenshots/drivers/goldens/
            git commit -m "chore(screenshots): update ${COUNT} golden baseline(s) [ci auto-commit]"
            git push --force-with-lease origin HEAD:${{ github.head_ref }}
            echo "Goldens committed and pushed to ${{ github.head_ref }}."
          else
            echo "All goldens match committed baselines."
          fi

      - name: Upload screenshot artifacts (for PR review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: test/screenshots/drivers/goldens/
          retention-days: 14
          if-no-files-found: warn
