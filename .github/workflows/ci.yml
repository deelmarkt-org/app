name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  MIN_COVERAGE: 70

jobs:
  # ──────────────────────────────────────────────
  # 1. Format + Analyze (strict)
  # ──────────────────────────────────────────────
  quality:
    name: Format & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-flutter

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Run analyzer (strict — fatal on info)
        run: flutter analyze --no-pub --fatal-infos

      # SCREENS-INVENTORY staling check (P-57). Warns at ≥60 days,
      # fails at ≥120 days. Runs on every CI, always — the doc is the
      # source of truth for screen coverage and stales silently otherwise.
      - name: SCREENS-INVENTORY staling check
        run: dart run scripts/check_screens_inventory.dart

      # Edge Function structure + schema cross-reference (B-59 — Tier-1
      # retrospective). The same script runs as a pre-commit hook on
      # staged .ts/.sql files; running it here with --all catches drift
      # introduced when someone bypasses the pre-commit hook (forbidden
      # via --no-verify but technically possible). Promotes pre-commit
      # discipline to a CI gate.
      - name: Edge Function structure + schema check (--all)
        run: bash scripts/check_edge_functions.sh --all

      # B-35: Smoke-test the synthetic alert audit script. Catches typos
      # in the EVENTS array, jq syntax errors, and stdin/stdout drift
      # before they surface during a quarterly audit when the operator
      # least wants surprises. Dry-run mode never contacts PagerDuty.
      - name: audit_monitoring_alerts.sh smoke test (dry-run)
        run: |
          bash -n scripts/audit_monitoring_alerts.sh
          PAGERDUTY_ROUTING_KEY=dummy bash scripts/audit_monitoring_alerts.sh \
            | tee /tmp/audit-dryrun.txt
          previewed=$(grep -c '^── \[AUDIT\]' /tmp/audit-dryrun.txt)
          if [[ "$previewed" != "4" ]]; then
            echo "::error::Expected 4 [AUDIT] events in dry-run output, got $previewed"
            exit 1
          fi

  # ──────────────────────────────────────────────
  # 2. Tests + Coverage
  # ──────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-flutter

      - name: Run tests with coverage
        run: flutter test --coverage --no-pub

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "::error::No coverage file found. Run tests with --coverage."
            exit 1
          fi

          TOTAL_LINES=$(grep 'LF:' coverage/lcov.info | cut -d: -f2 | paste -sd+ | bc)
          HIT_LINES=$(grep 'LH:' coverage/lcov.info | cut -d: -f2 | paste -sd+ | bc)

          if [ "$TOTAL_LINES" -eq 0 ]; then
            echo "::warning::No coverage data. Skipping threshold check for initial setup."
            exit 0
          fi

          COVERAGE=$(echo "scale=1; $HIT_LINES * 100 / $TOTAL_LINES" | bc)
          echo "Coverage: ${COVERAGE}% (${HIT_LINES}/${TOTAL_LINES} lines)"

          if [ "$(echo "$COVERAGE < $MIN_COVERAGE" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below minimum ${MIN_COVERAGE}%"
            exit 1
          fi

          echo "Coverage ${COVERAGE}% meets minimum ${MIN_COVERAGE}%"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 7

  # ──────────────────────────────────────────────
  # 3. Security — secrets, SCA, filesystem
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # SCA: Dependency vulnerability scanning (Google OSV database)
      - name: OSV-Scanner (dependency CVEs)
        uses: google/osv-scanner-action/osv-scanner-action@6fc714450122bda9d00e4ad5d639ad6a39eedb1f # v2.0.1
        with:
          scan-args: |-
            --lockfile=pubspec.lock
            --format=table

      # SCA: License compliance via pana + LICENSES.allowlist (B-60).
      # Replaces the prior heuristic GPL/AGPL grep — that approach missed
      # transitive GPL via native deps and dual-licensed packages, per
      # Tier-1 retrospective. Now driven by `scripts/check_dependencies_pana.dart`
      # which (a) requires pana for proper per-package SPDX license detection
      # (fail-closed by default — strict mode), (b) cross-references against
      # `LICENSES.allowlist` for documented exceptions, (c) emits a JSON
      # dependency manifest as a CI artifact for App Review §5.1.6
      # disclosure.
      #
      # Pana is pre-activated in this dedicated step so the license-check
      # step itself doesn't pay the activation network cost (per gemini
      # PR #267 review) — the script's internal presence check then
      # short-circuits and runs pana directly.
      - name: Pre-activate pana (cached per runner)
        run: dart pub global activate pana

      - name: License check (pana + LICENSES.allowlist, strict)
        run: dart run scripts/check_dependencies_pana.dart --emit-manifest

      - name: Upload dependency manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deps-manifest
          path: build/deps-manifest.json
          retention-days: 90
          if-no-files-found: warn

      # Secrets: Scan git history for leaked credentials
      - name: TruffleHog (secret scanning)
        uses: trufflesecurity/trufflehog@ddc015e5ed99942b2253d8ea16a0586a01ef2ab1 # v3.88.0
        with:
          extra_args: --results=verified,unknown

      # Filesystem: Scan for vulnerabilities, misconfigs, secrets
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

  # ──────────────────────────────────────────────
  # 4. SAST — SonarCloud
  # ──────────────────────────────────────────────
  sast:
    name: SAST Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-flutter

      - name: Download coverage for SonarCloud
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-report
          path: coverage/
        continue-on-error: true

      - name: SonarCloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Quality gate is enforced by SonarCloud's own GitHub App check
      # ("SonarCloud Code Analysis") — no need for the polling action here.
      # The sonarqube-quality-gate-action@v1 was removed because it
      # intermittently returns 403 on cross-branch PRs (dev→main).

      - name: Warn if SonarCloud skipped
        if: env.SONAR_TOKEN == ''
        run: |
          echo "::warning::SonarCloud scan skipped — SONAR_TOKEN not configured. Add it in repo Settings → Secrets."
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────
  # 5. Build check — mobile (APK)
  # ──────────────────────────────────────────────
  build-mobile:
    name: Build Check (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: ./.github/actions/setup-flutter
        with:
          supabase-project-id: ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase-anon-public: ${{ secrets.SUPABASE_ANON_PUBLIC }}
          sentry-dsn: ${{ secrets.SENTRY_DSN }}

      - name: Build APK (release)
        run: flutter build apk --release --no-pub --split-debug-info=build/debug-info --obfuscate

      - name: Check APK size budget
        run: |
          APK_PATH=$(find build -name "app-release.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::warning::APK not found, skipping size check"
            exit 0
          fi
          SIZE_MB=$(du -m "$APK_PATH" | cut -f1)
          echo "APK size: ${SIZE_MB}MB (budget: 65MB)"
          if [ "$SIZE_MB" -gt 65 ]; then
            echo "::error::APK size ${SIZE_MB}MB exceeds 65MB budget"
            exit 1
          fi

  # ──────────────────────────────────────────────
  # 6. Build check — web
  # ──────────────────────────────────────────────
  build-web:
    name: Build Check (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-flutter
        with:
          supabase-project-id: ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase-anon-public: ${{ secrets.SUPABASE_ANON_PUBLIC }}
          sentry-dsn: ${{ secrets.SENTRY_DSN }}

      - name: Check web platform exists
        id: web-check
        run: |
          if [ ! -f "web/index.html" ]; then
            echo "::warning::web/ not configured — skipping web build. Run 'flutter create --platforms web .' to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web (release)
        if: steps.web-check.outputs.skip != 'true'
        run: flutter build web --release --no-pub --csp

      - name: Web security checks
        if: steps.web-check.outputs.skip != 'true'
        run: |
          WEB_DIR="build/web"
          if [ ! -d "$WEB_DIR" ]; then
            echo "::warning::Web build directory not found"
            exit 0
          fi

          ISSUES=0

          # No source maps in production (exposes source code)
          SOURCEMAPS=$(find "$WEB_DIR" -name "*.js.map" 2>/dev/null)
          if [ -n "$SOURCEMAPS" ]; then
            echo "::error::Source maps found in production build!"
            ISSUES=$((ISSUES + 1))
          else
            echo "OK: No source maps"
          fi

          # No secrets in index.html
          if grep -q "supabaseUrl\|supabaseKey\|mollieKey\|apiKey" "$WEB_DIR/index.html" 2>/dev/null; then
            echo "::error::Potential secrets found in index.html!"
            ISSUES=$((ISSUES + 1))
          else
            echo "OK: No secrets in index.html"
          fi

          if [ "$ISSUES" -gt 0 ]; then
            exit 1
          fi

      - name: Check web bundle size
        if: steps.web-check.outputs.skip != 'true'
        run: |
          WEB_DIR="build/web"
          if [ ! -d "$WEB_DIR" ]; then
            exit 0
          fi

          # App JS budget: 5MB (our code). Total includes CanvasKit WASM (~30MB).
          APP_JS_KB=0
          if [ -f "$WEB_DIR/main.dart.js" ]; then
            APP_JS_KB=$(du -k "$WEB_DIR/main.dart.js" | cut -f1)
          fi
          TOTAL_MB=$(($(du -sk "$WEB_DIR" | cut -f1) / 1024))

          echo "Web bundle: ${TOTAL_MB}MB total (app JS: ${APP_JS_KB}KB)"

          if [ "$APP_JS_KB" -gt 5120 ]; then
            echo "::error::main.dart.js is ${APP_JS_KB}KB (>5MB)"
            exit 1
          fi
          if [ "$TOTAL_MB" -gt 50 ]; then
            echo "::error::Web bundle ${TOTAL_MB}MB exceeds 50MB"
            exit 1
          fi
