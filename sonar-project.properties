# SonarCloud configuration — single source of truth
# CI workflow reads this file; no duplicate args in ci.yml.
# Docs: https://docs.sonarsource.com/sonarcloud/

sonar.projectKey=deelmarkt-org_app
sonar.organization=deelmarkt-org
sonar.projectName=DeelMarkt
sonar.host.url=https://sonarcloud.io

# Sources
sonar.sources=lib/
sonar.tests=test/
sonar.sourceEncoding=UTF-8

# PR decoration — post summary comments on GitHub PRs
sonar.pullrequest.provider=GitHub
sonar.pullrequest.github.repository=deelmarkt-org/app

# Coverage
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclusions (generated code, codegen-dependent infrastructure, platform, assets)
sonar.exclusions=\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/*.mocks.dart,\
  lib/generated_plugin_registrant.dart,\
  lib/features/dev/**,\
  lib/core/services/firebase_service.dart,\
  lib/core/services/supabase_service.dart,\
  lib/core/services/env.dart,\
  android/**,\
  ios/**,\
  web/**,\
  assets/**

# Rule suppressions
# e1-e3: domain entity copyWith and repository search() need >7 params (idiomatic Dart)
# e4: S1135 (TODO comments) — all TODOs in this codebase are tracked against GitHub issues
#     or sprint tasks (e.g. TODO(#59), TODO(reso), TODO(auth)). Suppressed globally to avoid
#     noise; the backlog item is the source of truth, not this rule.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=dart:S107
sonar.issue.ignore.multicriteria.e1.resourceKey=**/domain/entities/**
sonar.issue.ignore.multicriteria.e2.ruleKey=dart:S107
sonar.issue.ignore.multicriteria.e2.resourceKey=**/domain/repositories/**
sonar.issue.ignore.multicriteria.e3.ruleKey=dart:S107
sonar.issue.ignore.multicriteria.e3.resourceKey=**/view_models/**,**/viewmodels/**
sonar.issue.ignore.multicriteria.e4.ruleKey=dart:S1135
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.dart

# Coverage exclusions (infrastructure wiring — requires integration tests, not unit tests)
# Supabase repos: SupabaseClient uses deeply nested generics that can't be mocked
# with mocktail. These will be covered by integration tests against the real Supabase sandbox.
# Router: GoRouter config and scaffold wiring require full widget/integration tests.
# Mock repos: test-only dev helpers — testing helpers with tests creates circular coverage.
# Auth providers: Riverpod DI wiring — always overridden in tests, never exercised directly.
# Domain repositories: abstract interfaces — no executable lines, only declarations.
sonar.coverage.exclusions=\
  lib/core/services/supabase_service.dart,\
  lib/core/services/firebase_service.dart,\
  lib/core/services/firebase_options.dart,\
  lib/core/services/push_notification_service.dart,\
  lib/core/services/env.dart,\
  lib/main.dart,\
  **/data/supabase/**,\
  **/data/mock/**,\
  **/mock_*_repository.dart,\
  **/viewmodels/auth_providers.dart,\
  lib/core/router/app_router.dart,\
  lib/core/router/scaffold_with_nav.dart,\
  **/domain/repositories/**,\
  lib/features/home/presentation/home_screen.dart,\
  lib/features/home/presentation/widgets/home_data_view.dart,\
  lib/widgets/listing_card.dart,\
  lib/core/services/repository_providers.dart,\
  lib/features/search/presentation/search_screen.dart,\
  lib/features/sell/presentation/screens/listing_creation_screen.dart,\
  lib/features/sell/presentation/widgets/photo_step/photo_step_view.dart
