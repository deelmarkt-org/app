# SonarCloud configuration
# Docs: https://docs.sonarsource.com/sonarcloud/

sonar.projectKey=deelmarkt_app
sonar.organization=deelmarkt
sonar.projectName=DeelMarkt

# Sources
sonar.sources=lib/
sonar.tests=test/
sonar.sourceEncoding=UTF-8

# Coverage
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclusions (generated code, assets, platform code)
sonar.exclusions=\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/*.mocks.dart,\
  lib/generated_plugin_registrant.dart,\
  android/**,\
  ios/**,\
  web/**,\
  assets/**

sonar.test.exclusions=\
  test/**

# Quality gate — SonarCloud "Sonar way" profile
# Blocks merge on: new bugs, new vulnerabilities, new code smells with A rating,
# new code coverage < 70%, new duplicated lines > 3%
