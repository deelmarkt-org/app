name: deelmarkt
description: "DeelMarkt — The trusted Dutch marketplace for second-hand goods."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Localization — E07 §Localisation
  easy_localization: ^3.0.7
  intl: any

  # Icons — Phosphor Icons with duotone support
  phosphor_flutter: ^2.1.0

  # Routing & deep linking
  go_router: ^14.8.1
  app_links: ^6.4.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend — Supabase (Auth, DB, Storage, Realtime, Edge Functions)
  supabase_flutter: ^2.8.0

  # Environment variables — compile-time safe, no secrets in source
  envied: ^1.1.1

  # Feature flags — Unleash (self-hosted)
  unleash_proxy_client_flutter: ^1.9.8

  # Firebase — push notifications, crash reporting, analytics, remote config
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  firebase_messaging: ^16.1.3
  firebase_remote_config: ^6.3.0
  firebase_performance: ^0.11.2

  # Payment — Mollie WebView checkout
  webview_flutter: ^4.10.0

  # Shipping — QR code display for label-free shipping
  qr_flutter: ^4.1.0

  # Entity equality — needed by Riverpod state diffing (Phase 1 v3.1 audit)
  equatable: ^2.0.7

  # UUID generation — stable ids for per-image upload state (P-24 R-27 wiring)
  uuid: ^4.5.1

  # Image caching — disk + memory cache with Cloudinary transform support (ADR-022)
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Error tracking — Sentry (free tier)
  sentry_flutter: ^9.0.0

  # Loading — Shimmer effect for skeleton placeholders (P-07)
  shimmer: ^3.0.0

  # Local persistence — consent record, user preferences
  shared_preferences: ^2.3.0

  # Biometric authentication — Face ID / Fingerprint (P-16)
  local_auth: ^2.3.0
  url_launcher: ^6.3.2

  # Social login — native OAuth (P-44)
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.2.2
  crypto: ^3.0.5

  # App info — version display in settings
  package_info_plus: ^8.2.1

  # Image picker — camera + gallery for avatar upload (P-53)
  image_picker: ^1.1.2

  # File path utilities — used by SupabaseAvatarUploadService for extension parsing
  path: ^1.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Riverpod code generation
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.13
  riverpod_lint: ^2.6.5

  # Environment variables code generation
  # Pinned to ^1.1.1 — envied_generator >=1.3.3 conflicts with riverpod_lint analyzer version
  envied_generator: ^1.1.1
  mocktail: ^1.0.4

  # Platform interface packages — required for ImagePickerPlatform test mocking
  image_picker_platform_interface: any
  plugin_platform_interface: any
  url_launcher_platform_interface: ^2.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/branding/logo/
    - assets/branding/icons/
    - assets/l10n/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
        - asset: assets/fonts/PlusJakartaSans-Italic-Variable.ttf
          style: italic
