<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-7xl mx-auto">
<div class="text-xl font-bold text-primary tracking-tight">Beoordeling</div>
<div class="flex items-center gap-4">
<button class="hover:bg-[#f6f3f2] p-2 rounded-full transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined text-[#4a4a4a]">close</span>
</button>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12 max-w-3xl mx-auto w-full">
<!-- Success Animation/Icon State -->
<div class="relative mb-8">
<div class="absolute inset-0 bg-tertiary/10 rounded-full blur-2xl transform scale-150"></div>
<div class="relative bg-surface-container-lowest h-24 w-24 rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-tertiary text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Success Message -->
<div class="text-center space-y-4 mb-12">
<h2 class="text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface">Bedankt!</h2>
<p class="text-on-surface-variant body-lg max-w-md mx-auto leading-relaxed">
                Wacht op de beoordeling van de verkoper. Zodra beide reviews binnen zijn worden ze zichtbaar.
            </p>
</div>
<!-- Primary Action -->
<div class="w-full max-w-xs mb-16">
<button class="w-full py-4 px-8 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all duration-300">
                Terug naar overzicht
            </button>
</div>
<!-- Listing Context Card -->
<div class="w-full bg-surface-container-low rounded-2xl p-6 flex items-center gap-6 group transition-all duration-300">
<div class="relative h-24 w-24 shrink-0 overflow-hidden rounded-xl">
<img alt="Premium headphones" class="h-full w-full object-cover" alt="Close-up of premium metallic silver headphones on a minimalist wooden table with soft morning sunlight and bokeh background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDtMWJ_ja5wGTrNHLg4cag_HoN6T-HienNEklJDgAgiyfyJho2khGVdofMvbayOl56VYEBqDOWJV70uwlXtOQ26Ep2Swu4NmrNpQV1IszyLsTWxJliecuNjipfNCRo0DumJ5zW130WyWKWxkeiP1qmL5i7x1yg7JfgGJ1NWvgLNXdK3PhRn4kdooX6cJlRIGowRFTdDhcKhrKCWZkoyzhufLhPoDjqMaDun6sX3znb_jCNAuUz3nGxVns1FLLplCDNeKnYt88dGt7VI"/>
</div>
<div class="flex-grow">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="text-secondary font-bold text-sm tracking-wide">VERKOCHT</span>
</div>
<h3 class="text-xl font-bold text-on-surface leading-tight mb-1">Vintage Studio Monitor Headphones</h3>
<p class="text-on-surface-variant text-sm font-medium">Verkocht aan <span class="text-on-surface">Mark J.</span></p>
<div class="mt-3 flex items-center gap-4">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-outline font-bold">Transactie</span>
<span class="text-secondary font-bold text-lg">€145,00</span>
</div>
<div class="h-8 w-[1px] bg-surface-variant"></div>
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-outline font-bold">Datum</span>
<span class="text-on-surface font-medium text-sm">12 Oct 2023</span>
</div>
</div>
</div>
<div class="hidden md:block">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</div>
</div>
<!-- Tonal Footer Info -->
<div class="mt-12 flex items-center gap-3 bg-surface-container-high/50 px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant text-sm">lock</span>
<span class="text-on-surface-variant text-xs font-medium">Beoordelingen zijn 14 dagen privé</span>
</div>

<div class="h-8 md:hidden"></div>
