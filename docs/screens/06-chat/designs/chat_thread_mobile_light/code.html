<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .offer-gradient {
            background: linear-gradient(135deg, #006b24 0%, #008730 100%);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #F15A24 0%, #d1430a 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed": "#d0e4ff",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#842500",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#9fcafc",
                        "primary-fixed-dim": "#ffb59e",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#65df75",
                        "surface-bright": "#fcf9f8",
                        "surface-container-low": "#f6f3f2",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "background": "#fcf9f8",
                        "on-surface": "#1c1b1b",
                        "on-surface-variant": "#5a4139",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#001d35",
                        "on-secondary-container": "#285782",
                        "on-error": "#ffffff",
                        "outline-variant": "#e2bfb4",
                        "secondary-container": "#a1cdff",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0ef",
                        "surface-container-highest": "#e5e2e1",
                        "tertiary-container": "#008730",
                        "on-primary-fixed": "#3a0b00",
                        "secondary": "#34618d",
                        "inverse-surface": "#313030",
                        "on-tertiary-container": "#f7fff2",
                        "tertiary": "#006b24",
                        "inverse-primary": "#ffb59e",
                        "tertiary-fixed": "#82fc8e",
                        "surface-container": "#f0edec",
                        "surface": "#fcf9f8",
                        "primary": "#F15A24",
                        "on-tertiary-fixed-variant": "#00531a",
                        "surface-dim": "#dcd9d9",
                        "error-container": "#ffdad6",
                        "primary-container": "#d1430a",
                        "on-tertiary-fixed": "#002106",
                        "on-background": "#1c1b1b",
                        "surface-variant": "#e5e2e1",
                        "primary-fixed": "#ffdbd0",
                        "surface-tint": "#ad3300",
                        "surface-container-high": "#ebe7e7",
                        "outline": "#8e7067",
                        "on-secondary-fixed-variant": "#164974"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface flex justify-center items-center min-h-screen">
<!-- Device Frame (iPhone 15 Pro Aesthetic) -->
<main class="relative w-[393px] h-[852px] bg-surface overflow-hidden shadow-[0_0_0_12px_#1c1b1b,0_0_0_14px_#313030,0_20px_50px_rgba(0,0,0,0.3)] rounded-[55px] border-[8px] border-zinc-800 flex flex-col">
<!-- Status Bar (Simplified) -->
<div class="h-12 w-full flex justify-between items-center px-8 z-50">
<span class="text-sm font-bold">9:41</span>
<div class="flex gap-1.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- TopAppBar -->
<header class="bg-surface/80 dark:bg-zinc-900/80 backdrop-blur-xl fixed top-0 w-full z-40 pt-10">
<div class="flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3">
<button class="hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors p-2 rounded-full scale-95 active:scale-100 duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="relative">
<img alt="Jan de Vries avatar showing online status" class="w-8 h-8 rounded-full object-cover" alt="close-up portrait of a friendly middle-aged Dutch man with short hair smiling against a soft blurred outdoor background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtQj3lBdPtLAhuMA877RzX9vXussalyxmD92FC3gqkQYwT-1Z0_rUcoEoFSWjEnOR5FzFl1Y5JxM-d0QZWlYl1fX1dXSTPgFrO7es4rOFdFik72LcSf8dKGNL_qJLoFW1SS9ovff9KnO5SN7i6NaRn7j7ZGZsUWN7HWR8ATpXU0AQ-jXUyUH0NAXvpVHlvQgENohQDZJQ3HQHyiV75-eTrimKHwc2LWNxBvyOn7C5OMWTnoIVsFBx69tnO4_F6mjGbuhH2hfvLtR7c"/>
<div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-tertiary border-2 border-surface rounded-full"></div>
</div>
<div class="flex flex-col">
<span class="font-plus-jakarta text-body-lg font-bold tracking-tight">Jan de Vries</span>
<span class="text-[10px] text-tertiary font-bold uppercase tracking-wider">Online</span>
</div>
</div>
<div class="flex gap-1">
<button class="hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors p-2 rounded-full scale-95 active:scale-100 duration-200">
<span class="material-symbols-outlined text-on-surface">call</span>
</button>
<button class="hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors p-2 rounded-full scale-95 active:scale-100 duration-200">
<span class="material-symbols-outlined text-on-surface">videocam</span>
</button>
<button class="hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors p-2 rounded-full scale-95 active:scale-100 duration-200">
<span class="material-symbols-outlined text-on-surface">more_vert</span>
</button>
</div>
</div>
</header>
<!-- Chat Content Canvas -->
<section class="flex-1 overflow-y-auto pt-28 pb-32 px-4 space-y-6">
<!-- Listing Card (Sticky-style header for context) -->
<div class="bg-surface-container-lowest p-3 rounded-xl flex items-center gap-4 shadow-sm border border-outline-variant/10">
<img alt="Canyon Speedmax thumbnail" class="w-16 h-16 rounded-lg object-cover" alt="sleek professional carbon fiber triathlon bike canyon speedmax in matte black finish on a white studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuClAGW86Renm_BeIJ3EdWqPBJO4m5QnmHFKmmdPZTs4MGoT5u8XIBVQ6WDYjc0V0NrhakWDE8RXHSvCqkeMvzdqyQRdEZxNcV1_hDWtUSlk5L14KpeqTQ1MvB3r4BldRBJdOkmbXIeFWEQRq0WY8MOVUwvqVHxqyufTperhPykEHTnKdj9JbgIyrP6BEy7W8Kcn67pP90MoPp_64pyp_jVu2yYA95T_PL-C8MFEP1UIbi7ybF9KcOgng9-3sjgvZYtSZPUDJJkNcZJr"/>
<div class="flex-1">
<h3 class="font-headline text-body-lg font-bold">Canyon Speedmax</h3>
<div class="flex items-center justify-between mt-1">
<span class="text-secondary font-bold text-headline-sm">€ 149,00</span>
<span class="bg-surface-container-high px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-tight text-on-surface-variant">Te koop</span>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
<!-- Date Separator -->
<div class="flex justify-center items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="text-[11px] font-bold text-outline uppercase tracking-widest">Vandaag</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Thread Messages -->
<div class="space-y-4">
<!-- Seller Message -->
<div class="flex flex-col items-start max-w-[80%]">
<div class="bg-surface-container-high text-on-surface px-4 py-3 rounded-2xl rounded-tl-none text-body-lg">
                        Hoi! Is de fiets nog beschikbaar?
                    </div>
<span class="text-[10px] mt-1 ml-1 text-outline font-medium">14:02</span>
</div>
<!-- Buyer Message (User) -->
<div class="flex flex-col items-end w-full">
<div class="max-w-[80%] primary-gradient text-white px-4 py-3 rounded-2xl rounded-tr-none text-body-lg shadow-lg shadow-primary/10">
                        Ja, nog beschikbaar! Wanneer kun je langskomen?
                    </div>
<div class="flex items-center gap-1 mt-1 mr-1">
<span class="text-[10px] text-outline font-medium">14:05</span>
<span class="material-symbols-outlined text-[12px] text-primary" style="font-variation-settings: 'FILL' 1;">done_all</span>
</div>
</div>
<!-- Offer Card -->
<div class="flex flex-col items-start w-full">
<div class="w-72 bg-surface-container-lowest rounded-2xl overflow-hidden shadow-md border border-outline-variant/10">
<div class="p-4 flex flex-col items-center text-center space-y-3">
<div class="w-12 h-12 rounded-full bg-tertiary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-3xl">payments</span>
</div>
<div>
<h4 class="text-sm font-bold text-outline uppercase tracking-tight">Nieuw Bod Ontvangen</h4>
<p class="text-3xl font-black text-on-surface mt-1">€ 120,00</p>
</div>
<div class="w-full flex flex-col gap-2 pt-2">
<button class="w-full py-3 rounded-xl offer-gradient text-white font-bold text-body-lg transition-all active:scale-95">
                                    Accepteren
                                </button>
<button class="w-full py-3 rounded-xl border-2 border-outline-variant/30 text-on-surface-variant font-bold text-body-lg hover:bg-surface-container transition-all active:scale-95">
                                    Afwijzen
                                </button>
</div>
</div>
<div class="bg-surface-container-low px-4 py-2 text-center">
<span class="text-[11px] font-semibold text-outline">Geldig voor 24 uur</span>
</div>
</div>
<span class="text-[10px] mt-1 ml-1 text-outline font-medium">14:10</span>
</div>
</div>
</section>
<!-- Input Bar -->
<footer class="absolute bottom-0 w-full bg-surface/90 backdrop-blur-2xl px-4 pt-4 pb-10 border-t border-outline-variant/10">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">photo_camera</span>
</button>
<div class="flex-1 relative flex items-center">
<input class="w-full bg-surface-container-high border-none rounded-full py-3 px-12 focus:ring-2 focus:ring-primary/20 text-body-md placeholder:text-outline/60" placeholder="Typ een bericht..." type="text"/>
<!-- Bod Chip -->
<div class="absolute left-3 bg-white shadow-sm border border-outline-variant/20 rounded-full px-2 py-0.5 flex items-center gap-1 cursor-pointer hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[14px] text-tertiary" style="font-variation-settings: 'FILL' 1;">sell</span>
<span class="text-[10px] font-bold text-on-surface">Bod</span>
</div>
<button class="absolute right-1 w-9 h-9 flex items-center justify-center bg-primary rounded-full text-white shadow-lg shadow-primary/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[20px]">arrow_upward</span>
</button>
</div>
</div>
</footer>
<!-- iPhone Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-on-surface/20 rounded-full"></div>
</main>
</body></html>
