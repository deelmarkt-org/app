<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Navigation Shell -->
<header class="sticky top-0 z-50 w-full bg-[#fcf9f8]/80 backdrop-blur-xl">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#F15A24] hover:opacity-80 transition-opacity scale-95 active:duration-150 ease-[cubic-bezier(0.23,1,0.32,1)]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] tracking-[-0.02em] font-bold text-2xl text-on-surface">Favorieten</h1>
</div>
<button class="text-[#4a4a4a] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<!-- Main Content Canvas: Empty State -->
<main class="flex-grow flex flex-col items-center justify-center px-8 text-center">

<div class="relative w-64 h-64 mb-12 flex items-center justify-center">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 bg-primary/5 rounded-full scale-110 blur-3xl"></div>
<!-- Principal Illustration Meta-Component -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-48 h-48 bg-surface-container-lowest rounded-[40px] shadow-2xl shadow-primary/10 flex items-center justify-center border border-outline-variant/15">
<span class="material-symbols-outlined text-[100px] text-primary" data-icon="favorite" style="font-variation-settings: 'FILL' 0;">favorite</span>
<!-- Floating Plus Badge -->
<div class="absolute -top-4 -right-4 w-16 h-16 bg-primary-container rounded-full flex items-center justify-center shadow-lg transform rotate-12">
<span class="material-symbols-outlined text-on-primary-container text-3xl font-bold" data-icon="add">add</span>
</div>
</div>
<!-- Supporting Decorative Shapes -->
<div class="absolute -bottom-6 -left-8 w-12 h-12 bg-secondary/10 rounded-xl rotate-45"></div>
<div class="absolute top-4 -left-12 w-8 h-8 bg-tertiary/10 rounded-full"></div>
</div>
</div>
<!-- Typography Stack -->
<div class="max-w-xs space-y-4">
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface leading-tight">
                Nog geen favorieten
            </h2>
<p class="text-on-surface-variant text-lg leading-relaxed font-medium">
                Tik op het hartje bij een advertentie om deze hier te bewaren.
            </p>
</div>
<!-- Call to Action -->
<div class="mt-12 w-full max-w-sm">
<button class="w-full py-5 px-8 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-xl shadow-xl shadow-primary/20 hover:opacity-90 transition-all scale-100 active:scale-95 ease-[cubic-bezier(0.23,1,0.32,1)] flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
                Start met ontdekken
            </button>
</div>
<!-- Featured Categories (Editorial Layout) -->
<div class="mt-16 w-full overflow-hidden">
<p class="text-left text-xs font-bold uppercase tracking-widest text-outline mb-6 px-2">Inspiratie voor jou</p>

</div>
</div>
<div class="flex-shrink-0 w-32 snap-center">
<div class="w-32 h-32 rounded-3xl bg-surface-container-high overflow-hidden relative">

<span class="absolute bottom-3 left-3 text-white text-[10px] font-bold uppercase">Tech</span>

</div>

<span class="absolute bottom-3 left-3 text-white text-[10px] font-bold uppercase">Hobby</span>
</div>
</div>
</div>

<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Ontdekken</span>

<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Berichten</span>
</button>
<!-- Profiel -->
<button class="flex flex-col items-center justify-center text-[#4a4a4a] opacity-60 hover:opacity-100 transition-all scale-90 active:duration-200 ease-[cubic-bezier(0.23,1,0.32,1)]">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider">Profiel</span>
