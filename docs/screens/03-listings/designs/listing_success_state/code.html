<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed": "#002106",
              "outline-variant": "#e2bfb4",
              "on-error": "#ffffff",
              "background": "#fcf9f8",
              "primary-fixed": "#ffdbd0",
              "on-secondary-fixed": "#001d35",
              "secondary": "#34618d",
              "tertiary": "#006b24",
              "outline": "#8e7067",
              "tertiary-fixed-dim": "#65df75",
              "primary-fixed-dim": "#ffb59e",
              "tertiary-fixed": "#82fc8e",
              "secondary-fixed-dim": "#9fcafc",
              "on-secondary-container": "#285782",
              "on-surface-variant": "#5a4139",
              "on-primary": "#ffffff",
              "on-tertiary-container": "#f7fff2",
              "on-secondary": "#ffffff",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "on-primary-fixed-variant": "#842500",
              "surface-dim": "#dcd9d9",
              "secondary-fixed": "#d0e4ff",
              "surface-bright": "#fcf9f8",
              "error": "#ba1a1a",
              "tertiary-container": "#008730",
              "surface-container-low": "#f6f3f2",
              "surface-container-high": "#ebe7e7",
              "inverse-on-surface": "#f3f0ef",
              "inverse-surface": "#313030",
              "surface-container-lowest": "#ffffff",
              "surface": "#fcf9f8",
              "on-background": "#1c1b1b",
              "surface-container": "#f0edec",
              "on-surface": "#1c1b1b",
              "primary-container": "#d1430a",
              "secondary-container": "#a1cdff",
              "primary": "#F15A24",
              "inverse-primary": "#ffb59e",
              "on-primary-container": "#fffbff",
              "on-secondary-fixed-variant": "#164974",
              "surface-container-highest": "#e5e2e1",
              "on-primary-fixed": "#3a0b00",
              "surface-variant": "#e5e2e1",
              "surface-tint": "#ad3300",
              "on-tertiary-fixed-variant": "#00531a"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans", "sans-serif"],
              "body": ["Plus Jakarta Sans", "sans-serif"],
              "label": ["Plus Jakarta Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .confetti-canvas {
            background-image: radial-gradient(circle at 20% 30%, #F15A24 2px, transparent 0),
                              radial-gradient(circle at 70% 10%, #34618d 3px, transparent 0),
                              radial-gradient(circle at 40% 80%, #006b24 2px, transparent 0),
                              radial-gradient(circle at 90% 60%, #a1cdff 4px, transparent 0),
                              radial-gradient(circle at 10% 90%, #F15A24 3px, transparent 0),
                              radial-gradient(circle at 80% 40%, #008730 2px, transparent 0);
            background-size: 100% 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Success Feedback Canvas -->
<main class="relative w-full max-w-md px-6 py-12 flex flex-col items-center text-center">
<!-- Confetti Background Layer -->
<div class="absolute inset-0 opacity-40 confetti-canvas pointer-events-none"></div>
<!-- Success Illustration Container -->
<div class="relative z-10 mb-10">
<div class="w-32 h-32 bg-tertiary-container/10 rounded-full flex items-center justify-center relative">
<!-- Outer Pulse Rings -->
<div class="absolute inset-0 border-4 border-tertiary/20 rounded-full scale-110"></div>
<div class="absolute inset-0 border-2 border-tertiary/10 rounded-full scale-125"></div>
<!-- The Main Checkmark Icon -->
<span class="material-symbols-outlined text-tertiary text-7xl font-bold" style="font-variation-settings: 'wght' 700;">
                    check_circle
                </span>
</div>
</div>
<!-- Editorial Content -->
<div class="relative z-10 space-y-4">
<h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface leading-tight">
                Gepubliceerd!
            </h1>
<p class="text-lg text-on-surface-variant/80 font-medium leading-relaxed max-w-[280px] mx-auto">
                Je advertentie voor de <span class="text-on-surface font-bold">Canyon Speedmax</span> staat nu online.
            </p>
</div>
<!-- Product Preview Card (Asymmetric Layout) -->
<div class="relative z-10 mt-12 w-full">
<div class="bg-surface-container-lowest rounded-3xl p-4 shadow-[0_20px_50px_rgba(0,0,0,0.04)] flex items-center gap-4 text-left border border-outline-variant/10">
<div class="w-20 h-20 rounded-2xl overflow-hidden flex-shrink-0">
<img alt="Canyon Speedmax Triathlon Bike" class="w-full h-full object-cover" alt="Sleek matte black triathlon racing bike on a clean white studio background with soft dramatic shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2ifITHRIabNuxTtD3QSbhtQk77wM-h-HWIEanJ6Wsygc4n1PDXGns4NzFc4f5g5kpnG9NO6-bv1lLXhd3UvW-X3bWYgvbIJywCxhsJhj8ItXCRykxetFki7NWrz5rHt51RO7nDaSyWCEcdo-dOWSnDz-trnrW_bcZ8zTcjtZ5dGtbPfm07oiIJrTR7-9dIyHK0wTvhNdLfmhXSWO19n7uPfivv3NEbDTScApD-dzWGfvN_tn53c-G0rQgDg_Hx6OANG4haaFGSSRX"/>
</div>
<div>
<p class="text-[10px] uppercase tracking-widest font-bold text-primary mb-1">Actief</p>
<h3 class="font-bold text-on-surface line-clamp-1">Canyon Speedmax CF SLX</h3>
<p class="text-secondary font-bold text-lg mt-0.5">€ 4.250</p>
</div>
<div class="ml-auto">
<span class="material-symbols-outlined text-on-surface-variant opacity-30">chevron_right</span>
</div>
</div>
</div>
<!-- Action Section -->
<div class="relative z-10 mt-12 w-full flex flex-col gap-4">
<!-- Primary Action -->
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all cubic-bezier(0.23,1,0.32,1) duration-300">
                Bekijk advertentie
            </button>
<!-- Secondary Action (Ghost/Editorial) -->
<button class="w-full py-4 px-6 bg-transparent text-on-surface-variant font-bold text-base rounded-2xl border-2 border-transparent hover:bg-surface-container-high transition-colors">
                Nog een advertentie plaatsen
            </button>
</div>
<!-- Trust Indicator -->
<div class="relative z-10 mt-12 flex items-center gap-2 px-4 py-2 bg-tertiary/5 rounded-full">
<span class="material-symbols-outlined text-tertiary text-sm" data-weight="fill">verified_user</span>
<span class="text-[11px] font-bold text-tertiary uppercase tracking-wider">Kwaliteitsgarantie door DeelMarkt</span>
</div>
</main>
<!-- Navigation Shell (BottomNavBar) - Suppressed per rules for Focused Success screen -->
<!-- However, providing a minimal "Back to Dashboard" for UX continuity if the user exits success -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50">
<button class="flex items-center gap-2 text-on-surface-variant/60 hover:text-on-surface transition-colors font-semibold text-sm">
<span class="material-symbols-outlined text-lg">close</span>
            Sluiten
        </button>
</div>
</body></html>
