<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DeelMarkt - Registratie &amp; Verificatie</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "primary-fixed": "#ffdbd0",

              "surface-variant": "#e5e2e1",
              "outline-variant": "#e2bfb4",
              "error": "#ba1a1a",

              "on-error-container": "#93000a",

              "tertiary-fixed-dim": "#65df75",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 md:p-12 overflow-x-hidden">
<!-- Main Container for both states -->
<div class="flex flex-col xl:flex-row gap-12 w-full max-w-[1100px] items-start justify-center">
<!-- STATE 1: REGISTRATION FORM -->
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-[32px] p-8 md:p-10 shadow-[0_8px_40px_rgba(0,0,0,0.04)] relative">
<!-- Header -->
<div class="flex items-center gap-4 mb-8">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-on-surface">Account aanmaken</h1>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-3 py-3.5 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-all duration-200 group">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsnb0LX2kWdbim98s9doJSlfUNlJQ4ZzttlgnXGm4Fy1Thlgx4ETnN1yMIpVy2884q-_XpKZynYWcTVc3pdRFMlHiEbh2dT5e6OMIcLIkn9Qze_p7t22CYt2c1vwLfjW2xop9M_eOn5ivvWSCyrEHkdUevGwoUqFzdMN1i1WZ8iRDoET3pVqxuHQ8OM9xddhwNUjImAmc_6UkmsT26bgW01cwlBKBmP-SXHbwa54egAgq-rX5ghZ0TtcLdt4HDbab5uABWxsAwrgjO"/>
<span class="font-semibold text-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3.5 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-all duration-200 group">
<span class="material-symbols-outlined text-xl">ios</span>
<span class="font-semibold text-sm">Apple</span>
</button>
</div>
<!-- Divider -->
<div class="relative flex items-center justify-center mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<span class="relative bg-surface-container-lowest px-4 text-sm font-medium text-outline">of</span>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<!-- Email -->
<div>
<label class="block text-sm font-bold text-on-surface mb-2 px-1">E-mailadres</label>
<input class="w-full h-14 px-5 rounded-xl border-none bg-surface-container-low focus:ring-2 focus:ring-brand-orange/40 transition-shadow" placeholder="naam@voorbeeld.nl" type="email"/>
</div>
<!-- Phone -->
<div>
<label class="block text-sm font-bold text-on-surface mb-2 px-1">Telefoonnummer</label>
<div class="flex gap-2">
<div class="flex items-center justify-center bg-surface-container-high px-4 rounded-xl text-sm font-bold border-none h-14">
                            +31
                        </div>
<input class="flex-1 h-14 px-5 rounded-xl border-none bg-surface-container-low focus:ring-2 focus:ring-brand-orange/40 transition-shadow" placeholder="6 12345678" type="tel"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block text-sm font-bold text-on-surface mb-2 px-1">Wachtwoord</label>
<div class="relative">
<input class="w-full h-14 px-5 pr-12 rounded-xl border-none bg-surface-container-low focus:ring-2 focus:ring-brand-orange/40 transition-shadow" placeholder="Minimaal 8 tekens" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Strength Bar -->
<div class="mt-3 px-1">
<div class="flex justify-between items-center mb-1.5">
<span class="text-[11px] font-bold uppercase tracking-wider text-outline">Wachtwoordsterkte</span>
<span class="text-[11px] font-bold text-amber-600">Medium</span>
</div>
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden flex gap-1">
<div class="h-full w-1/3 bg-amber-500 rounded-full"></div>
<div class="h-full w-1/3 bg-amber-500 rounded-full"></div>
<div class="h-full w-1/3 bg-surface-container-highest rounded-full"></div>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 px-1">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-brand-orange focus:ring-brand-orange cursor-pointer" id="terms" type="checkbox"/>
<label class="text-sm leading-relaxed text-on-surface-variant" for="terms">
                        Ik ga akkoord met de <a class="text-brand-orange font-bold hover:underline" href="#">Algemene voorwaarden</a> en <a class="text-brand-orange font-bold hover:underline" href="#">Privacybeleid</a>.
                    </label>
</div>
<!-- Submit -->
<button class="w-full h-14 bg-brand-orange text-white font-bold rounded-xl shadow-lg shadow-brand-orange/20 hover:scale-[1.01] active:scale-[0.98] transition-all duration-200" type="submit">
                    Account aanmaken
                </button>
</form>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant font-medium">
                    Al een account? <a class="text-brand-blue font-bold hover:underline ml-1" href="#">Inloggen</a>
</p>
</div>
</div>
<!-- STATE 2: OTP VERIFICATION -->
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-[32px] p-8 md:p-10 shadow-[0_8px_40px_rgba(0,0,0,0.04)]">
<!-- Header -->
<div class="flex items-center gap-4 mb-8">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-on-surface">Verificatie</h1>
</div>
<!-- Illustration -->
<div class="flex justify-center mb-10">
<div class="relative w-48 h-48 bg-surface-container rounded-full flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-brand-orange/10 to-transparent"></div>
<div class="relative z-10 w-24 h-40 bg-white rounded-3xl border-[6px] border-surface-container-highest shadow-xl flex flex-col items-center justify-center p-4">
<div class="w-10 h-10 rounded-full bg-tertiary-container/20 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-tertiary font-bold" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="space-y-1.5 w-full">
<div class="h-1.5 w-full bg-surface-container-low rounded-full"></div>
<div class="h-1.5 w-2/3 bg-surface-container-low rounded-full"></div>
</div>
</div>
<!-- Decorative Floating Elements -->
<div class="absolute top-8 right-8 w-4 h-4 rounded-full bg-brand-orange/40 blur-sm"></div>
<div class="absolute bottom-10 left-6 w-8 h-8 rounded-full bg-secondary-container/30 blur-md"></div>
</div>
</div>
<!-- Copy -->
<div class="text-center mb-10">
<h2 class="text-xl font-bold text-on-surface mb-2">Voer de code in</h2>
<p class="text-on-surface-variant leading-relaxed">
                    We hebben een 6-cijferige verificatiecode verzonden naar <span class="font-bold text-on-surface">+31 6 •••• 1234</span>
</p>
</div>
<!-- OTP Input -->
<div class="flex justify-between gap-3 mb-10">
<input class="w-14 h-14 rounded-xl border-none bg-surface-container-low text-center text-xl font-extrabold text-on-surface focus:ring-2 focus:ring-brand-orange/40 transition-shadow outline-none" maxlength="1" type="text"/>
<input class="w-14 h-14 rounded-xl border-none bg-surface-container-low text-center text-xl font-extrabold text-on-surface focus:ring-2 focus:ring-brand-orange/40 transition-shadow outline-none" maxlength="1" type="text"/>
<input class="w-14 h-14 rounded-xl border-none bg-surface-container-low text-center text-xl font-extrabold text-on-surface focus:ring-2 focus:ring-brand-orange/40 transition-shadow outline-none" maxlength="1" type="text"/>
<input class="w-14 h-14 rounded-xl border-none bg-surface-container-low text-center text-xl font-extrabold text-on-surface focus:ring-2 focus:ring-brand-orange/40 transition-shadow outline-none" maxlength="1" type="text"/>
<input class="w-14 h-14 rounded-xl border-none bg-surface-container-low text-center text-xl font-extrabold text-on-surface focus:ring-2 focus:ring-brand-orange/40 transition-shadow outline-none" maxlength="1" type="text"/>
<input class="w-14 h-14 rounded-xl border-none bg-surface-container-low text-center text-xl font-extrabold text-on-surface focus:ring-2 focus:ring-brand-orange/40 transition-shadow outline-none" maxlength="1" type="text"/>
</div>
<!-- CTA -->
<button class="w-full h-14 bg-brand-orange text-white font-bold rounded-xl shadow-lg shadow-brand-orange/20 hover:scale-[1.01] active:scale-[0.98] transition-all duration-200 mb-8">
                Verifiëren
            </button>
<!-- Resend -->
<div class="text-center">
<div class="flex items-center justify-center gap-2 text-sm font-bold text-brand-blue">
<span class="material-symbols-outlined text-lg">timer</span>
<span>Opnieuw versturen in 0:45</span>
</div>
</div>
</div>
</div>
<!-- Decorative background elements to match "The Curated Commons" star -->
<div class="fixed top-0 left-0 -z-10 opacity-20 pointer-events-none">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="100" cy="100" fill="url(#paint0_linear_1)" r="150"></circle>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="paint0_linear_1" x1="100" x2="100" y1="-50" y2="250">
<stop stop-color="#F15A24"></stop>
<stop offset="1" stop-color="white" stop-opacity="0"></stop>
</lineargradient>
</defs>
</svg>
</div>
<div class="fixed bottom-0 right-0 -z-10 opacity-10 pointer-events-none transform rotate-180">
<svg fill="none" height="600" viewbox="0 0 400 400" width="600" xmlns="http://www.w3.org/2000/svg">
<circle cx="100" cy="100" fill="url(#paint1_linear_1)" r="250"></circle>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="paint1_linear_1" x1="100" x2="100" y1="-50" y2="350">
<stop stop-color="#34618D"></stop>
<stop offset="1" stop-color="white" stop-opacity="0"></stop>
</lineargradient>
</defs>
</svg>
</div>
</body></html>
