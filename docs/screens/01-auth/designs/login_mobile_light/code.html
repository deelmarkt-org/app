<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .iphone-frame {
            width: 393px;
            height: 852px;
            border: 12px solid #1c1b1b;
            border-radius: 54px;
            position: relative;
            overflow: hidden;
            background: #fcf9f8;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .dynamic-island {
            width: 120px;
            height: 35px;
            background: #1c1b1b;
            border-radius: 20px;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-high flex items-center justify-center min-h-screen p-4">
<!-- iPhone 15 Pro Frame -->
<div class="iphone-frame shadow-2xl">
<div class="dynamic-island"></div>
<!-- Status Bar Mockup -->
<div class="flex justify-between px-8 pt-4 pb-2 text-[12px] font-bold text-on-surface">
<span>9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[14px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[14px]">wifi</span>
<span class="material-symbols-outlined text-[14px]">battery_full</span>
</div>
</div>
<main class="h-full flex flex-col px-6 pt-12">
<!-- Logo Section -->
<div class="flex flex-col items-center justify-center mb-10">
<div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center shadow-lg mb-4">
<span class="material-symbols-outlined text-white text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">handshake</span>
</div>
<h1 class="text-primary text-2xl font-extrabold tracking-tighter">DeelMarkt</h1>
</div>
<!-- Welcome Message -->
<div class="mb-8">
<h2 class="text-on-surface text-3xl font-extrabold tracking-tight mb-2">Welkom terug</h2>
<p class="text-outline text-sm">Log in om verder te gaan met veilig handelen.</p>
</div>
<!-- Social Login -->
<div class="space-y-3 mb-8">
<button class="w-full h-[52px] flex items-center justify-center gap-3 border-2 border-secondary rounded-xl font-semibold text-secondary hover:bg-secondary-fixed transition-colors">
<img alt="Google" class="w-5 h-5" alt="Official Google G logo in its brand colors on a clean white circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWXJkzybj-sFg197VNdUfwmijMwE9Dj6diD_XNeIRWMRTRn-i48xFHMW8QVv5JnHiN6_YN3JwJfW2ueQT8KC3LgjFpis5RyUmtucR6Vq34AFmdeLN05cX-gD4VfyXVd43ZaoNDaZZYXF6ajXUsVDGI1KXyuWFtnUDuHNrM1SF0ixUHJ8vnNPrDqoGznkoKmxK09TyZ5PHNElsXZ5vv86Rl19_IVuRE-GpHbQ-RTs_GhiCHrblG0CwoB_RkSQtbCZnpxzJXHmhOFOn2"/>
                    Doorgaan met Google
                </button>
<button class="w-full h-[52px] flex items-center justify-center gap-3 border-2 border-secondary rounded-xl font-semibold text-secondary hover:bg-secondary-fixed transition-colors">
<span class="material-symbols-outlined text-xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">ios</span>
                    Doorgaan met Apple
                </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-8">
<div class="h-px bg-surface-variant flex-1"></div>
<span class="text-outline text-xs font-bold uppercase tracking-widest">of</span>
<div class="h-px bg-surface-variant flex-1"></div>
</div>
<!-- Form -->
<form class="space-y-5">
<div class="space-y-2">
<label class="text-xs font-bold text-outline ml-1 uppercase tracking-wider">E-mailadres</label>
<input class="w-full h-14 px-4 bg-surface-container-lowest border-2 border-surface-variant rounded-[10px] focus:border-primary focus:ring-0 transition-all text-on-surface placeholder:text-outline/50 font-medium" placeholder="naam@voorbeeld.nl" type="email"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-outline ml-1 uppercase tracking-wider">Wachtwoord</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-lowest border-2 border-surface-variant rounded-[10px] focus:border-primary focus:ring-0 transition-all text-on-surface placeholder:text-outline/50 font-medium" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="text-primary text-xs font-bold hover:underline" href="#">Wachtwoord vergeten?</a>
</div>
</div>
<button class="w-full h-[52px] bg-primary text-white rounded-[12px] font-bold text-lg shadow-md active:scale-[0.98] transition-transform mt-4" type="submit">
                    Inloggen
                </button>
</form>
<!-- Face ID -->
<div class="flex flex-col items-center mt-8 gap-2">
<button class="w-12 h-12 flex items-center justify-center text-outline/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-4xl">face</span>
</button>
<span class="text-[10px] font-bold text-outline uppercase tracking-tighter">Gebruik Face ID</span>
</div>
<!-- Footer Link -->
<div class="mt-auto pb-12 text-center">
<p class="text-sm text-outline font-medium">
                    Nieuw bij DeelMarkt? <br/>
<a class="text-primary font-extrabold hover:underline" href="#">Account aanmaken</a>
</p>
</div>
</main>
<!-- Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-on-surface/20 rounded-full"></div>
</div>
<!-- Hidden bottom nav rule implementation (Suppressed as per rules for login) -->
<!-- But keeping the logic available for user interaction -->
<nav class="hidden">
<ul>
<li>Zoeken</li>
<li>Verkopen</li>
<li>Berichten</li>
<li>Profiel</li>
</ul>
</nav>
</body></html>
