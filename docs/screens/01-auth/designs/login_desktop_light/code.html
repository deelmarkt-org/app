<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#fcf9f8",
              "surface-container-high": "#ebe7e7",
              "on-surface": "#1c1b1b",
              "on-background": "#1c1b1b",
              "inverse-on-surface": "#f3f0ef",
              "secondary-fixed-dim": "#9fcafc",
              "surface-container-lowest": "#ffffff",
              "on-surface-variant": "#5a4139",
              "on-tertiary": "#ffffff",
              "on-tertiary-fixed-variant": "#00531a",
              "primary": "#F15A24",
              "on-primary-container": "#fffbff",
              "on-secondary": "#ffffff",
              "surface-variant": "#e5e2e1",
              "error": "#ba1a1a",
              "outline-variant": "#e2bfb4",
              "surface-dim": "#dcd9d9",
              "primary-fixed": "#ffdbd0",
              "surface-container-low": "#f6f3f2",
              "outline": "#8e7067",
              "surface-container-highest": "#e5e2e1",
              "on-secondary-fixed": "#001d35",
              "tertiary": "#006b24",
              "on-tertiary-container": "#f7fff2",
              "inverse-primary": "#ffb59e",
              "surface-container": "#f0edec",
              "primary-fixed-dim": "#ffb59e",
              "background": "#fcf9f8",
              "on-secondary-container": "#285782",
              "secondary-container": "#a1cdff",
              "on-error": "#ffffff",
              "on-primary-fixed-variant": "#842500",
              "secondary-fixed": "#d0e4ff",
              "tertiary-fixed-dim": "#65df75",
              "on-primary-fixed": "#3a0b00",
              "tertiary-container": "#008730",
              "on-tertiary-fixed": "#002106",
              "on-error-container": "#93000a",
              "tertiary-fixed": "#82fc8e",
              "inverse-surface": "#313030",
              "error-container": "#ffdad6",
              "on-secondary-fixed-variant": "#164974",
              "surface-bright": "#fcf9f8",
              "on-primary": "#ffffff",
              "secondary": "#34618d",
              "primary-container": "#d1430a",
              "surface-tint": "#ad3300"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #F15A24 0%, #d1430a 100%);
        }
        .no-line-divider::before, .no-line-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #e5e2e1;
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="max-w-[1200px] w-full flex justify-center">
<!-- Login Card -->
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-[24px] p-10 md:p-12 shadow-[0_8px_30px_rgb(0,0,0,0.04)] transition-all duration-300">
<!-- Brand Logo & Heading -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="mb-6">
<span class="text-3xl font-extrabold text-primary tracking-tighter">DeelMarkt</span>
</div>
<h1 class="text-[32px] font-extrabold text-on-surface tracking-tight leading-tight">Welkom terug</h1>
<p class="text-on-surface-variant mt-2 font-medium">Log in op je account om verder te gaan.</p>
</div>
<!-- Social Buttons -->
<div class="space-y-3 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-3.5 px-6 border border-secondary/20 rounded-xl text-on-secondary-container font-semibold hover:bg-secondary/5 transition-colors duration-200">
<img alt="" class="w-5 h-5" alt="Official Google multicolored 'G' logo icon simplified for user interface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_HVp3RV9FsEnzeSC0kRiWM6Vgnep8ZKLX3PVhvtowet5Prvj4Y-P2-tOzdylIHa91Knmv2CfuQqw8v2uWrTdK7RAontrckRNCeGV5QVrvx_LzWJx4wp2Oxv0XiZd5-Kdp_pncKP5qMXRlTDXZP_MmIsx0npSK_OsFqxSUSiLzK7StPKmXEZDUfnfuMWilh4YspsbydrcBMoBg9Z2_pst9PCu7liDDwecTkrm0kgR6Dtx941BpmWNasJWIflMYmumFW4cYoaOvxyGt"/>
                        Doorgaan met Google
                    </button>
<button class="w-full flex items-center justify-center gap-3 py-3.5 px-6 border border-secondary/20 rounded-xl text-on-secondary-container font-semibold hover:bg-secondary/5 transition-colors duration-200">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">ios</span>
                        Doorgaan met Apple
                    </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-8 no-line-divider">
<span class="text-xs font-bold uppercase tracking-widest text-outline">of</span>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-bold text-on-surface ml-1" for="email">E-mailadres</label>
<div class="relative">
<input class="w-full h-[52px] px-4 rounded-[10px] bg-surface-container-low border border-surface-variant focus:border-primary/40 focus:ring-4 focus:ring-primary/10 transition-all duration-200 outline-none placeholder:text-outline/60 font-medium" id="email" placeholder="naam@voorbeeld.nl" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-bold text-on-surface" for="password">Wachtwoord</label>
<a class="text-sm font-bold text-primary hover:opacity-80 transition-opacity" href="#">Wachtwoord vergeten?</a>
</div>
<div class="relative">
<input class="w-full h-[52px] px-4 rounded-[10px] bg-surface-container-low border border-surface-variant focus:border-primary/40 focus:ring-4 focus:ring-primary/10 transition-all duration-200 outline-none placeholder:text-outline/60 font-medium" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full h-[52px] btn-gradient text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all duration-300" type="submit">
                        Inloggen
                    </button>
</form>
<!-- Footer Link -->
<div class="mt-10 pt-8 text-center">
<p class="text-on-surface-variant font-medium">
                        Nieuw bij DeelMarkt?
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Account aanmaken</a>
</p>
</div>
</div>
</div>
</main>
<!-- Footer Cluster (Shared Component) -->
<footer class="w-full py-12 mt-auto bg-[#f6f3f2] hidden md:flex flex-col items-center gap-4 border-t border-slate-200">
<div class="flex gap-8 mb-2">
<a class="font-['Plus_Jakarta_Sans'] text-xs text-on-surface-variant hover:text-primary underline" href="#">Privacy</a>
<a class="font-['Plus_Jakarta_Sans'] text-xs text-on-surface-variant hover:text-primary underline" href="#">Voorwaarden</a>
<a class="font-['Plus_Jakarta_Sans'] text-xs text-on-surface-variant hover:text-primary underline" href="#">Contact</a>
<a class="font-['Plus_Jakarta_Sans'] text-xs text-on-surface-variant hover:text-primary underline" href="#">Over ons</a>
</div>
<div class="text-lg font-bold text-primary">DeelMarkt</div>
<p class="font-['Plus_Jakarta_Sans'] text-xs text-on-surface-variant">© 2024 DeelMarkt. Veilig en vertrouwd handelen.</p>
</footer>
<!-- Visual Accent Element (Decorative) -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-full opacity-50 pointer-events-none overflow-hidden hidden lg:block">
<div class="absolute top-[-10%] right-[-10%] w-full h-full rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-5%] w-[80%] h-[80%] rounded-full bg-secondary/5 blur-[100px]"></div>
</div>
</body></html>
