<!DOCTYPE html>

<html class="dark" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#121212",
                        "surface-container-high": "#1e1e1e",
                        "on-surface": "#f2f2f2",
                        "on-background": "#f2f2f2",
                        "inverse-on-surface": "#121212",
                        "primary": "#FF7A4D",
                        "primary-container": "#d1430a",
                        "on-primary": "#ffffff",
                        "secondary": "#A0A0A0",
                        "outline": "#333333",
                        "surface-container-lowest": "#1e1e1e",
                        "surface-variant": "#2a2a2a",
                        "on-surface-variant": "#A0A0A0"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.875rem",
                        "xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #121212;
            color: #f2f2f2;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">
<!-- iPhone 15 Pro Frame Mockup -->
<div class="relative w-[393px] h-[852px] bg-surface rounded-[55px] border-[8px] border-[#2a2a2a] shadow-[0_0_50px_rgba(0,0,0,0.8)] overflow-hidden flex flex-col">
<!-- Status Bar -->
<div class="flex justify-between items-center px-8 pt-4 pb-2 w-full z-10">
<span class="text-sm font-bold">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-sm">wifi</span>
<span class="material-symbols-outlined text-sm">battery_full</span>
</div>
</div>
<!-- Dynamic Island -->
<div class="absolute top-3 left-1/2 -translate-x-1/2 w-32 h-9 bg-black rounded-full z-20"></div>
<!-- Main Content -->
<div class="flex-1 px-8 pt-12 flex flex-col">
<!-- Logo Section -->
<div class="mb-12 flex flex-col items-center">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">handshake</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-primary">DeelMarkt</h1>
<p class="mt-2 text-secondary font-medium">Welkom terug</p>
</div>
<!-- Social Login -->
<div class="space-y-4 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-3.5 bg-surface-container-high border border-outline rounded-xl hover:bg-surface-variant transition-colors group">
<img alt="" class="w-5 h-5" data-alt="Google colorful G logo icon on transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCT9heEL0pTIXOIa4by5SKJrLCEJUbCqD5Jtc3GRpNLUKAsFrG2_CLF87bzQ6DOYbTkJd8_VsR9P9RikyjjTwZBV7UVshh9CotzMViuB7SpGd5XixswbhHe1bSKJRw_5JWUOzb8nqPqpcge30A_aLPqrnvDbWxo1l36yuFftDPgSKEP9bd5ILk_yTtKD42CpMinXfmcXIIkmBvFUEVgUMynt6C6SqCa5tlFMv7SyGMIXnzCHJmU-NF-IjBjWhpGfdTcGskT2oVPodNM"/>
<span class="text-sm font-semibold">Ga verder met Google</span>
</button>
<button class="w-full flex items-center justify-center gap-3 py-3.5 bg-surface-container-high border border-outline rounded-xl hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-sm font-semibold">Ga verder met Apple</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-8">
<div class="flex-1 h-px bg-outline"></div>
<span class="text-[10px] uppercase tracking-widest text-secondary font-bold">of e-mail</span>
<div class="flex-1 h-px bg-outline"></div>
</div>
<!-- Form -->
<div class="space-y-5">
<div class="space-y-2">
<label class="text-xs font-bold text-secondary ml-1">E-mailadres</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary text-xl group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-high border border-outline focus:border-primary/50 focus:ring-4 focus:ring-primary/10 rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 outline-none transition-all" placeholder="naam@voorbeeld.nl" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-secondary ml-1 flex justify-between">
                        Wachtwoord
                        <a class="text-primary hover:underline" href="#">Vergeten?</a>
</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary text-xl group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-high border border-outline focus:border-primary/50 focus:ring-4 focus:ring-primary/10 rounded-xl py-3.5 pl-12 pr-12 text-on-surface placeholder:text-on-surface-variant/40 outline-none transition-all" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-secondary hover:text-on-surface transition-colors">visibility</button>
</div>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-xl font-bold text-base shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform mt-2">
                    Inloggen
                </button>
</div>
<!-- Biometrics & Footer -->
<div class="mt-auto pb-12 flex flex-col items-center">
<button class="mb-8 p-3 bg-surface-container-high border border-outline rounded-2xl hover:bg-surface-variant transition-all group active:scale-90">
<span class="material-symbols-outlined text-3xl text-primary" style="font-variation-settings: 'wght' 200;">face</span>
</button>
<p class="text-sm text-secondary">
                    Nog geen account?
                    <a class="text-primary font-bold hover:underline" href="#">Meld je aan</a>
</p>
</div>
</div>
<!-- Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>
<!-- Decorative background elements -->
<div class="fixed -z-10 top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="fixed -z-10 bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-secondary-fixed-dim/5 blur-[120px] rounded-full"></div>
</body></html>
