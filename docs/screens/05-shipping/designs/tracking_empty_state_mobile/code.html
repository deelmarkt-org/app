<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#001d35",
              "inverse-surface": "#313030",
              "tertiary-fixed": "#82fc8e",
              "surface-container-highest": "#e5e2e1",
              "secondary": "#34618d",
              "error-container": "#ffdad6",
              "primary-container": "#d1430a",
              "on-primary": "#ffffff",
              "on-surface": "#1c1b1b",
              "surface-container": "#f0edec",
              "on-secondary": "#ffffff",
              "inverse-primary": "#ffb59e",
              "tertiary-container": "#008730",
              "primary-fixed-dim": "#ffb59e",
              "outline-variant": "#e2bfb4",
              "on-surface-variant": "#5a4139",
              "on-secondary-fixed-variant": "#164974",
              "on-primary-fixed-variant": "#842500",
              "secondary-container": "#a1cdff",
              "primary": "#a93200",
              "surface": "#fcf9f8",
              "primary-fixed": "#ffdbd0",
              "tertiary-fixed-dim": "#65df75",
              "surface-bright": "#fcf9f8",
              "on-tertiary-fixed-variant": "#00531a",
              "on-tertiary-container": "#f7fff2",
              "on-primary-fixed": "#3a0b00",
              "secondary-fixed-dim": "#9fcafc",
              "on-primary-container": "#fffbff",
              "inverse-on-surface": "#f3f0ef",
              "outline": "#8e7067",
              "background": "#fcf9f8",
              "surface-variant": "#e5e2e1",
              "surface-tint": "#ad3300",
              "tertiary": "#006b24",
              "on-secondary-container": "#285782",
              "surface-container-high": "#ebe7e7",
              "surface-container-low": "#f6f3f2",
              "on-tertiary-fixed": "#002106",
              "on-background": "#1c1b1b",
              "surface-dim": "#dcd9d9",
              "error": "#ba1a1a",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#d0e4ff",
              "on-tertiary": "#ffffff",
              "on-error": "#ffffff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 w-full bg-[#fcf9f8]/80 backdrop-blur-xl transition-opacity">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
<h1 class="text-xl font-bold text-[#121212] tracking-tight font-['Plus_Jakarta_Sans']">Tracking</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#F15A24]" data-icon="help">help</span>
<span class="material-symbols-outlined text-[#F15A24]" data-icon="more_vert">more_vert</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pb-32">
<!-- Empty State Widget -->
<div class="w-full max-w-sm text-center space-y-8">
<!-- Icon Container with Tonal Layering -->
<div class="relative inline-flex items-center justify-center w-32 h-32 bg-surface-container-low rounded-full">
<!-- Inner Glassmorphic Circle -->
<div class="absolute inset-0 m-4 bg-surface-container-lowest shadow-sm rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-on-surface/40" data-icon="schedule">schedule</span>
</div>
<!-- Decorative Accent -->
<div class="absolute -top-1 -right-1 w-6 h-6 bg-primary-container rounded-full border-4 border-surface"></div>
</div>
<!-- Text Content -->
<div class="space-y-4">
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface font-headline">Nog geen updates</h2>
<p class="text-on-surface-variant text-lg leading-relaxed font-body">
                    We laten het je weten zodra het pakket is ingeleverd bij de vervoerder.
                </p>
</div>
<!-- Action Area (Optional but helps UI weight) -->
<div class="pt-6">
<button class="bg-surface-container-high text-on-secondary-container px-8 py-4 rounded-xl font-bold transition-all active:scale-95 duration-200 ease-[cubic-bezier(0.23,1,0.32,1)]">
                    Bekijk bestelling
                </button>
</div>
</div>
<!-- Decorative Illustration Element (Subtle Background) -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full -z-10 opacity-20 pointer-events-none">
<div class="w-96 h-96 mx-auto bg-gradient-to-br from-primary/10 to-transparent blur-3xl rounded-full"></div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-2 bg-[#fcf9f8]/80 backdrop-blur-xl shadow-[0_-4px_24px_rgba(0,0,0,0.04)] rounded-t-[32px]">
<!-- Shop -->
<div class="flex flex-col items-center justify-center text-[#121212]/40 px-4 py-2 hover:text-[#F15A24] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="storefront">storefront</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide uppercase">Shop</span>
</div>
<!-- Bids -->
<div class="flex flex-col items-center justify-center text-[#121212]/40 px-4 py-2 hover:text-[#F15A24] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="gavel">gavel</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide uppercase">Bids</span>
</div>
<!-- Tracking (Active State) -->
<div class="flex flex-col items-center justify-center bg-[#F15A24]/10 text-[#F15A24] rounded-2xl px-4 py-2 scale-90 duration-200 ease-[cubic-bezier(0.23,1,0.32,1)]">
<span class="material-symbols-outlined mb-1" data-icon="local_shipping" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide uppercase">Tracking</span>
</div>
<!-- Profile -->
<div class="flex flex-col items-center justify-center text-[#121212]/40 px-4 py-2 hover:text-[#F15A24] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide uppercase">Profile</span>
</div>
</nav>
</body></html>
