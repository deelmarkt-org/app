<!DOCTYPE html>
<html lang="nl">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DeelMarkt — De eerlijke marktplaats van Nederland">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSP (B-36 + Phase 1 WASM fix)
       'wasm-unsafe-eval' required for CanvasKit WASM (WebAssembly.compileStreaming).
       'unsafe-inline' required by Flutter web bootstrap (flutter_bootstrap.js).
       worker-src 'blob:' required for CanvasKit worker threads.
       Permissions-Policy and X-Frame-Options must be HTTP headers (Cloudflare), not meta tags.
       TODO Sprint 3: replace 'unsafe-inline' with 'sha256-<hash>' of flutter_bootstrap.js.
       TODO Sprint 3: add report-uri for CSP violation monitoring. -->
  <!-- Local-dev hosts (http(s)://127.0.0.1:* and localhost:*) are added so
       `scripts/dev-up.sh` (see docs/LOCAL-STACK.md) can hit a local Supabase
       stack from the web target. These hosts are unreachable from prod so
       allowing them is a no-op in production.
       `upgrade-insecure-requests` dropped because it auto-upgrades
       http://127.0.0.1 → https and breaks the local API on :54321. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.gstatic.com/flutter-canvaskit/ https://www.gstatic.com/firebasejs/ https://browser.sentry-cdn.com https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http://127.0.0.1:* http://localhost:* https://res.cloudinary.com https://*.supabase.co; media-src 'self' http://127.0.0.1:* http://localhost:* https://res.cloudinary.com https://*.supabase.co; connect-src 'self' http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:* https://*.supabase.co wss://*.supabase.co https://api.mollie.com https://www.gstatic.com/flutter-canvaskit/ https://fonts.gstatic.com https://firebaseinstallations.googleapis.com https://firebaseremoteconfig.googleapis.com https://*.sentry.io; font-src 'self' https://fonts.gstatic.com; frame-src https://*.mollie.com; frame-ancestors 'none'; worker-src 'self' blob:; object-src 'none'; base-uri 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DeelMarkt">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph (P-46) — default tags, overridden by Cloudflare Worker for /listings/ and /users/ -->
  <meta property="og:title" content="DeelMarkt — De eerlijke marktplaats van Nederland" />
  <meta property="og:description" content="Koop en verkoop tweedehands met vertrouwen. Escrow-betalingen, gratis verzending via PostNL & DHL, en ingebouwde oplichtersbescherming." />
  <meta property="og:image" content="https://deelmarkt.com/og-default.png" />
  <meta property="og:url" content="https://deelmarkt.com" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="DeelMarkt" />
  <meta property="og:locale" content="nl_NL" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DeelMarkt — De eerlijke marktplaats van Nederland" />
  <meta name="twitter:description" content="Koop en verkoop tweedehands met vertrouwen. Escrow-betalingen, gratis verzending via PostNL & DHL, en ingebouwde oplichtersbescherming." />
  <meta name="twitter:image" content="https://deelmarkt.com/og-default.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>DeelMarkt</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
