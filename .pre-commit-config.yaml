# .pre-commit-config.yaml
# Install: pre-commit install && pre-commit install --hook-type pre-push
# Run manually: pre-commit run --all-files

repos:
  # ── General (all projects) ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: "(secrets|credentials|service-account)\\.json"
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "dev"]

  # ── Secrets scanning ───────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "(test-fixtures|golden)\\..*"

  # ── Flutter / Dart ─────────────────────────────────────────────────────
  - repo: local
    hooks:
      # dart format — FAIL FAST mode (do not auto-fix during hook)
      # If this fails: run `dart format .` manually, then re-commit
      - id: dart-format
        name: dart format
        language: system
        entry: bash -c 'dart format --set-exit-if-changed lib/ test/ scripts/'
        pass_filenames: false
        files: \.dart$
        stages: [pre-commit]

      - id: flutter-analyze
        name: flutter analyze
        language: system
        entry: bash -c 'flutter analyze --no-pub'
        pass_filenames: false
        files: \.dart$
        stages: [pre-commit]

      # CLAUDE.md quality gate — file length, imports, l10n, semantics, patterns
      - id: quality-check
        name: quality check (CLAUDE.md rules)
        language: system
        entry: bash -c 'dart run scripts/check_quality.dart'
        pass_filenames: false
        files: \.dart$
        stages: [pre-commit]

      # Targeted tests — only runs tests for changed files (cross-platform)
      # Maps lib/X.dart → test/X_test.dart, also runs directly changed test files
      - id: flutter-test-affected
        name: flutter test (affected only)
        language: system
        entry: bash -c 'dart run scripts/test_affected.dart'
        pass_filenames: false
        files: \.dart$
        stages: [pre-commit]

      # Thorough quality check — SonarCloud proxy (duplicate strings, nested ternaries, long methods)
      # Moved to pre-commit: fast script, no benefit in delaying to push
      - id: quality-check-thorough
        name: quality check (SonarCloud proxy)
        language: system
        entry: bash -c 'dart run scripts/check_quality.dart --thorough'
        pass_filenames: false
        files: \.dart$
        stages: [pre-commit]

      # P-54 D16/C2: accessibility audit — flags <44px touch targets on
      # tappable widgets and color literals outside design tokens. Runs on
      # any staged Dart file change in lib/. CLAUDE.md §10 (EAA compliance).
      - id: a11y-check
        name: accessibility audit (CLAUDE.md §10)
        language: system
        entry: dart run scripts/check_a11y.dart
        pass_filenames: false
        files: ^lib/.*\.dart$
        stages: [pre-commit]

      # P-58a: dependency-pin guard — fails on permissive `: any` constraints
      # in pubspec.yaml (silent supply-chain risk). Gated on pubspec.yaml so
      # it only runs when the dependency manifest is touched.
      - id: dependency-pin-check
        name: dependency-pin guard (P-58a)
        language: system
        entry: dart run scripts/check_dependencies.dart
        pass_filenames: false
        files: ^pubspec\.yaml$
        stages: [pre-commit]

      # ── Supabase / Edge Functions (TypeScript + SQL) ─────────────────────

      # Edge Function linter — structure (deno.json, shared imports) +
      # schema cross-reference (column names vs migrations)
      - id: edge-function-check
        name: edge function lint + schema check
        language: system
        entry: bash scripts/check_edge_functions.sh
        pass_filenames: false
        files: \.(ts|sql)$
        exclude: _test\.ts$
        stages: [pre-commit]

      # Build runner freshness — ensures .g.dart files exist before analyze.
      # Without this, flutter analyze fails on generated code references.
      - id: build-runner-check
        name: build_runner freshness
        language: system
        entry: >-
          bash -c 'STALE=false; for src in $(grep -rl "part '\''.*\.g\.dart'\''" lib/ 2>/dev/null); do g="${src%.dart}.g.dart"; if [ ! -f "$g" ]; then STALE=true; break; fi; done; if $STALE; then echo "Generated files missing — running build_runner..."; flutter pub run build_runner build --delete-conflicting-outputs; fi'
        pass_filenames: false
        files: \.dart$
        stages: [pre-commit]

      # Deno lint — catches unused imports, type errors, style issues
      # Fails if deno is not installed — run: bash scripts/setup.sh
      - id: deno-lint
        name: deno lint (Edge Functions)
        language: system
        entry: >-
          bash -c 'if ! command -v deno &>/dev/null; then echo "ERROR: deno not installed. Run: bash scripts/setup.sh"; exit 1; fi; deno lint supabase/functions/ --compact'
        pass_filenames: false
        files: ^supabase/functions/.*\.ts$
        stages: [pre-commit]

      # Deno format check — consistent TypeScript formatting
      # Fails if deno is not installed — run: bash scripts/setup.sh
      - id: deno-fmt-check
        name: deno fmt check (Edge Functions)
        language: system
        entry: >-
          bash -c 'if ! command -v deno &>/dev/null; then echo "ERROR: deno not installed. Run: bash scripts/setup.sh"; exit 1; fi; deno fmt --check supabase/functions/'
        pass_filenames: false
        files: ^supabase/functions/.*\.ts$
        stages: [pre-commit]

      # P-57: SCREENS-INVENTORY staling check. Gated on the file itself so it
      # only runs when the inventory is touched — fast local feedback that the
      # `**Last updated:**` header was bumped. CI runs the same check on every
      # PR for protection against the inventory silently aging without edits.
      - id: screens-inventory-staling
        name: SCREENS-INVENTORY staling check
        language: system
        entry: dart run scripts/check_screens_inventory.dart
        pass_filenames: false
        files: ^docs/SCREENS-INVENTORY\.md$
        stages: [pre-commit]

      # R-26: Quality score parity — keeps Dart client + TS Edge Function
      # weights/thresholds in lock-step. Triggers when either source changes.
      - id: quality-score-parity
        name: quality score Dart↔TS parity
        language: system
        entry: bash scripts/check_quality_score_parity.sh
        pass_filenames: false
        files: ^(lib/core/constants\.dart|supabase/functions/_shared/quality_score_weights\.ts)$
        stages: [pre-commit]

      # ── Push-time gates ────────────────────────────────────────────────

      # Fast analyze pass on push — catches any regressions in generated files
      - id: flutter-analyze-strict
        name: flutter analyze (strict)
        language: system
        entry: bash -c 'flutter analyze --no-pub --fatal-infos'
        pass_filenames: false
        files: \.dart$
        stages: [pre-push]

      # Deployment drift check — warns if migrations or Edge Functions are pending.
      # Runs on push when .sql or .ts files under supabase/ are staged.
      # Warning only (|| true) — does not block push if supabase CLI is missing.
      - id: deployment-drift
        name: deployment drift check
        language: system
        entry: >-
          bash -c 'if command -v supabase &>/dev/null && [[ -f supabase/.temp/project-ref ]]; then bash scripts/check_deployments.sh; else echo "supabase CLI not linked — skipping deployment check"; fi || true'
        pass_filenames: false
        files: ^supabase/
        stages: [pre-push]

      # New-code coverage gate — blocks push if changed files < 80% covered
      - id: coverage-gate
        name: new-code coverage (≥80%)
        language: system
        entry: bash -c 'dart run scripts/check_new_code_coverage.dart'
        pass_filenames: false
        files: \.dart$
        stages: [pre-push]
